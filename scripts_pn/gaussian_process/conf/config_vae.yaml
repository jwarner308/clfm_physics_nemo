# Gaussian Process VAE Training Configuration

arch:
  latent_dim: 4
  p_deeponet: 64
  h_encoder: 128
  h_trunk: 128
  h_branch: 128
  nhl_encoder: 3
  nhl_trunk: 2
  nhl_branch: 2

training:
  epochs: 10000
  lr: 0.001
  batch_size: 256
  grad_clip: 0.5
  seed: 0

loss:
  res_weight: 0.1
  kld_weight: 1.0e-6

data:
  N_data: 1000
  num_sensors: 5
  num_colloc: 50
  gp_var: 0.5
  gp_cov_len: 0.1
  use_cov: false

output:
  result_dir: results_pn/gaussian_process
