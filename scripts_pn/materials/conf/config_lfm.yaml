# Materials LFM Training Configuration

arch:
  latent_dim: 64
  p_deeponet: 128
  h_encoder: 128
  h_trunk: 128
  h_branch: 128
  nhl_encoder: 3
  nhl_trunk: 2
  nhl_branch: 2

flow_matching:
  epochs: 1000
  lr: 0.001
  batch_size: 256
  hidden_size: 128
  num_hidden_layers: 3
  sigma_min: 0.01

training:
  grad_clip: 0.5
  seed: 0
  lr: 0.001
  batch_size: 256
  num_workers: 16

loss:
  res_weight: 1.0e-6
  kld_weight: 1.0e-6
  lbc_weight: 1.0
  rbc_weight: 1.0

data:
  N_data: 1000
  num_test_data: 500
  num_colloc: 100

output:
  result_dir: results_pn/materials
  vae_checkpoint: null
  version: 0
